<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title> Fontes Externas</title>
   
   <style>
        @font-face {
            font-family: 'Love' ;
            src: url('') format
            ('opentype'), url('love larry. ttf')
            format('truetype');
            font-weight: normal;
            font-style: normal;
            

            /*
               -tipos de formart()
               -opentype (otf)
               -truetype (ttf.)
               -embedded-opentype
               -truetype-att (apple advanced type prograpy)
               -svg
            
            
            */
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            font-family: 'Love', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
