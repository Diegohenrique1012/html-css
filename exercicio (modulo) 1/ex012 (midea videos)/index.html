<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedado localmente</h1>
    <p>Este vídeo está hospedado no meu proprio 
    sevidor</p>

    <!-- <video src="midea/Meu Video-Mp4 2.mp4" width="300"
    controls></video> -->
    <h2>Uma linda tartaruga</h2>


    <video width="300" poster="imagem/" controls autoplay loop>
        <source src="midea/Meu Video-Mp4 2.mp4" type="Video/mp4">
        <source src="midea/Meu Video-webm.webm" type="Video/webm">
        <source src="midea/Meu Video-Mp4 2.ogv" type="Video/ogv">
        <source src="midea/Meu Video-Mp4 2.m4v" type="Video/m4v">
     <p>Seu navegador não tem contabilidade com a produção 
         vídeo.</p>
    </video>
    <h1>Inserindo vídeo do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/
    embed/FdE5G95B7Mg?si=I4QH-KjiuHKJkvJ2" title="YouTube video
    player" frameborder="0" allow="accelerometer; autoplay;
    clipboard-write; encrypted-media; gyroscope; picture-in-picture;
    web-share" referrerpolicy="strict-origin-when-cross-origin"
     allowfullscreen></iframe>



</body>
</html>
